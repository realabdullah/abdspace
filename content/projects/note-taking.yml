title: Note Taking
description: A versatile note-taking web application featuring flexible storage options (local IndexedDB and cloud appwrite sync), note organization through tags and archives, and customizable themes - all wrapped in a responsive modern interface.
role: Product design and full-stack engineering
outcome: Flexible notes that work locally first and sync when needed.
challenge: Balance local ownership, cloud sync and organization without overwhelming the note-taking flow.
approach: Start with fast local capture, then make tags, archives and sync available as supporting layers.
learnings: Offline-first products need to communicate state clearly and quietly.
