title: Smart Pass
description: A password manager designed to help users securely store and manage their passwords. It utilizes REST API calls to interact with a server, allowing users to store their sensitive login information in a safe and organized manner.
role: Product design and frontend engineering
outcome: An approachable interface for managing sensitive credentials.
challenge: Make security feel clear and trustworthy without exposing users to unnecessary technical language.
approach: Keep the interaction model familiar, make state visible, and separate sensitive operations from everyday browsing.
learnings: Trust is communicated through small moments of clarity, not only through encryption claims.
