title: Audiophile
description: Discover and shop for premium audio gadgets, including speakers, headphones, and earphones, in this side project e-commerce web app. Explore a curated selection of high-quality audio equipment for enthusiasts and discover the perfect audio gear for your needs.
role: Product design and frontend engineering
outcome: A focused storefront for exploring premium audio gear.
challenge: Present a broad product catalogue without losing the feeling of a curated premium shop.
approach: Use clear product hierarchy, focused categories and a lightweight browsing flow.
learnings: Commerce interfaces benefit from restraint; every extra control competes with the product.
