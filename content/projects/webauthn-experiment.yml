title: WebAuthn Experiment
description: My exploration into the world of WebAuthn – a cutting-edge authentication technology. This project showcases the potential for secure and passwordless login experiences on the web, offering a glimpse into the future of online security.
role: Security engineering and interface prototyping
outcome: A practical exploration of passwordless authentication on the web.
challenge: Understand a security standard well enough to make the user experience feel approachable.
approach: Pair a minimal interface with a focused exploration of registration and authentication flows.
learnings: Security UX improves when the system explains what is happening at the exact moment it matters.
