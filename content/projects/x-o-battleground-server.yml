title: x-o-battleground ws server
description: The server for x-o-battleground is responsible for maintaining game data in real time. It tracks moves, updates scores, and supports reconnection so that players can continue their game even after a refresh.
role: Backend engineering
outcome: Real-time game state with resilient reconnection support.
challenge: Keep shared game state consistent while clients connect, disconnect and reconnect.
approach: Model the server around authoritative state, real-time events and recoverable sessions.
learnings: Real-time systems reward simple state ownership and explicit event boundaries.
