title: x-o-battleground
description: x-o battleground offers a simple interface to play multiplayer tic-tac-toe. it establishes a real-time connection to the server for game updates and utilizes local storage to maintain consistent player IDs between sessions.
role: Product design and frontend engineering
outcome: A small multiplayer game built around immediacy and play.
challenge: Keep multiplayer state understandable while players make quick, competitive moves.
approach: Pair a small interface with real-time updates and persistent player identity across refreshes.
learnings: Even tiny games become systems problems once time and multiple users enter the picture.
