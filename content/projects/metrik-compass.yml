title: Metrik Compass
description: A guided product-metrics planner that turns feature context into recommended measures, baselines, targets, guardrails, and definitions.
role: Product engineer
outcome: A focused planning tool that helps product teams move from a feature idea to a measurable success plan without starting from a blank page.
challenge: Teams often choose metrics after a feature ships, or confuse activity counts with evidence of value. Metrik Compass guides the planning conversation before implementation begins.
approach: A Nuxt UI wizard collects feature type, affected users, behavior change, business goal, experiment context, rollout scope, and baseline availability. A typed metrics engine then maps that context to primary metrics, formulas, benchmark ranges, targets, guardrails, and a searchable glossary.
learnings: Good metric recommendations depend as much on asking the right questions as they do on the final formula. The wizard makes assumptions visible before it produces an answer.
