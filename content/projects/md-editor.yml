title: MD Editor
description: I've developed a dynamic web application using Nuxt.js, which offers users a real-time Markdown content preview. With this application, users can effortlessly compose and format Markdown text while receiving instant visual feedback
role: Product design and frontend engineering
outcome: A fast, local-first writing surface with immediate feedback.
challenge: Make writing and previewing Markdown feel continuous instead of like two separate tools.
approach: Keep the editor direct, preserve local work and make the rendered result visible immediately.
learnings: Small developer tools become valuable when they remove repeated context switching.
