name: Writing source guard

on:
  pull_request:
  push:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject portfolio writing edits
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files="$(git diff --name-only --diff-filter=AM "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'content/blog/**' 'content/writings/**' 'content/.remote-blog/**' 'content/.remote-writings/**')"
          else
            files="$(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}" -- 'content/blog/**' 'content/writings/**' 'content/.remote-blog/**' 'content/.remote-writings/**')"
          fi
          if [ -n "$files" ]; then
            echo "Writing content is owned by the abdspace-blog repository. Publish writings through https://writings.abdspace.xyz/admin."
            echo "$files"
            exit 1
          fi
